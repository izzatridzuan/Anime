basePath: /
definitions:
  models.AnimeResponse:
    properties:
      created_at:
        type: string
      episodes:
        type: integer
      genre:
        type: string
      id:
        type: integer
      image_url:
        type: string
      release_date:
        type: string
      status:
        type: string
      studios:
        items:
          $ref: '#/definitions/models.StudioResponse'
        type: array
      title:
        type: string
    type: object
  models.PaginatedResponse-models_AnimeResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.AnimeResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  models.StudioResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing anime and studios
  title: Anime Backoffice API
  version: "1.0"
paths:
  /api/anime:
    get:
      description: Returns a paginated list of anime with optional filters
      parameters:
      - description: Filter by title
        in: query
        name: title
        type: string
      - description: Filter by genre
        in: query
        name: genre
        type: string
      - description: Filter by status (ongoing, completed, upcoming)
        in: query
        name: status
        type: string
      - description: Filter by season (spring, summer, autumn, winter)
        in: query
        name: season
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PaginatedResponse-models_AnimeResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all anime
      tags:
      - anime
swagger: "2.0"
